<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog – Daniela Reséndiz</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    :root { --page-max: 1100px; }
    .wrapper { max-width: var(--page-max); margin: 0 auto; padding: 40px 24px 120px; }
    .post-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
    @media (max-width:980px) { .post-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:640px) { .post-grid { grid-template-columns:1fr; } }
    .post-card { display:block; text-decoration:none; color:inherit; }
    .post-thumb { position:relative; aspect-ratio:1/1; overflow:hidden; border-radius:2px; background:#111; }
    .post-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .35s ease; display:block; }
    .post-thumb::after { content:""; position:absolute; inset:0; border-radius:inherit; background:rgba(0,0,0,0); transition:background .25s ease; }
    .post-card:hover .post-thumb img { transform:scale(1.03); }
    .post-card:hover .post-thumb::after { background:rgba(0,0,0,.15); }
    .post-caption { margin-top:8px; text-align:center; }
    .post-name { display:block; font-size:.8rem; color:#fff; line-height:1.4; }
    .post-meta { display:block; font-size:.65rem; color:#aaa; text-transform:uppercase; letter-spacing:.06em; margin-top:3px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="navbar">
      <div class="brand">
        <a href="index.html" style="text-decoration:none;color:inherit;">Daniela Reséndiz</a>
      </div>
      <nav class="menu" aria-label="Principal">
        <a href="index.html">Bio</a>
        <a href="projects.html">Proyectos</a>
        <a href="publication.html">Publicaciones</a>
        <a href="teaching.html">Docencia</a>
        <a href="../en/blog.html" lang="en" hreflang="en" rel="alternate" class="lang-switch">EN</a>
      </nav>
    </div>
  </header>

  <main class="wrapper">
    <section class="post-grid">
      <a class="post-card" href="https://danielaresendizg.github.io/blog_repository_01_batavia/" target="_blank" rel="noopener">
        <figure class="post-thumb">
          <img src="../Blog_01_Batavia.jpg" alt="Batavia">
        </figure>
        <div class="post-caption">
          <span class="post-name">Leer la identidad a través del espacio: etnicidad y control urbano desde Batavia hasta el presente</span>
          <span class="post-meta">Ensayo · Jakarta</span>
        </div>
      </a>
    </section>
  </main>

  <footer class="contact-bar" role="contentinfo">
    <div class="contact-inner">
      <div class="contact-actions">
        <a class="btn" href="mailto:daniela.garcia.24@alumni.ucl.ac.uk">Email</a>
        <a class="btn" href="https://mx.linkedin.com/in/daniela-res%C3%A9ndiz-1a815010a" target="_blank" rel="noreferrer">LinkedIn</a>
        <a class="btn" href="blog.html">Blog</a>
      </div>
    </div>
  </footer>
</body>
</html>
